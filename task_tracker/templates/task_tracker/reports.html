{% load static %}

<style>
    body {
        background-color: #121212;
        color: #f1f1f1;
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
        padding: 0;
    }

    .reports-container {
        padding: 20px;
        min-height: 100vh;
        background-color: #181818;
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #00acc1;
        font-weight: 600;
        font-size: 36px;
        letter-spacing: 2px;
    }

    .report-card {
        background: #1e1e2f;
        border-radius: 12px;
        padding: 25px;
        margin-bottom: 30px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        transition: all 0.3s ease;
    }

    .report-card:hover {
        box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .report-card h3 {
        margin-bottom: 15px;
        color: #80cbc4;
        font-size: 22px;
        font-weight: 500;
        text-transform: uppercase;
    }

    input[type="date"], button {
        padding: 10px;
        margin-top: 10px;
        background-color: #2d2d3c;
        color: white;
        border: none;
        border-radius: 5px;
        margin-right: 10px;
        transition: background-color 0.3s;
    }

    input[type="date"]:focus, button:focus {
        outline: none;
        background-color: #3b3b4f;
    }

    button:hover {
        background-color: #00acc1;
        cursor: pointer;
    }

    .chart-wrapper {
        display: flex;
        justify-content: center;
    }

    canvas {
        width: 100% !important;
        max-width: 500px;
        height: 300px !important;
        background-color: #2a2a3a;
        border-radius: 10px;
        padding: 10px;
        display: block;
        margin: 20px auto 0;
    }

    .filter-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
    }

    .report-card .button-container {
        text-align: center;
    }

    .filter-container input, .filter-container button {
        width: auto;
    }
</style>

<div class="reports-container">
    <h2>📊 Reports & Statistics</h2>

    <div class="report-card">
        <h3>Task Completion Overview</h3>
        <div class="chart-wrapper">
            <canvas id="completionChart"></canvas>
        </div>
    </div>

    <div class="report-card">
        <h3>Team Performance</h3>
        <div class="chart-wrapper">
            <canvas id="performanceChart"></canvas>
        </div>
    </div>

    <div class="report-card">
        <h3>Overdue Tasks Summary</h3>
        <div class="chart-wrapper">
            <canvas id="overdueChart"></canvas>
        </div>
    </div>

    <div class="report-card">
        <h3>Custom Date-Based Filtering</h3>
        <div class="filter-container">
            <input type="date" id="startDate">
            <span>to</span>
            <input type="date" id="endDate">
            <button onclick="fetchCustomData()">Filter</button>
        </div>
        <div class="chart-wrapper">
            <canvas id="customChart"></canvas>
        </div>
    </div>
</div>

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{% static 'js/reports_charts.js' %}"></script>
{% endblock %}
